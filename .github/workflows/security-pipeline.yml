name: Shift-Left Security Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Layer 1: Secret Scanning ──────────────────────────────────────
  secret-scan:
    name: "Layer 1 – Secret Scanning (Gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Layer 2: SAST ─────────────────────────────────────────────────
  sast:
    name: "Layer 2 – SAST (Semgrep)"
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/javascript
            p/nodejs
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # ── Layer 3: SCA ──────────────────────────────────────────────────
  sca:
    name: "Layer 3 – SCA (OWASP Dependency-Check)"
    runs-on: ubuntu-latest
    needs: sast
    steps:
      - uses: actions/checkout@v4
      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'juice-shop'
          path: '.'
          format: 'HTML'
          args: >
            --failOnCVSS 7
            --disableRetireJS
      - name: Upload SCA Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: reports/

  # ── Layer 4: Container Scanning ───────────────────────────────────
  container-scan:
    name: "Layer 4 – Container Scan (Trivy)"
    runs-on: ubuntu-latest
    needs: sca
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t juice-shop:${{ github.sha }} .
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: juice-shop:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-results.sarif